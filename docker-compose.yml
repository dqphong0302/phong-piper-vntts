version: "3.8"

services:
  tts-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vietnamese-tts-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount models as volume for easy updates
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
